      string: '{"content":{"body":"Dear Jane Doe\r\n\r\n#Renew your waste carrier
        registration by 24 May 2026\r\n\r\n#You can renew online in a few minutes
        at: \r\nhttp://localhost:3002/fo/renew/GwbpirxiBsCR2LYdM4869LCd\r\n\r\nRegistration
        number: CBDU1\r\n\r\nConviction checks could take up to 5 weeks. You should
        plan for this if you have any relevant convictions. \r\n\r\nIf you no longer
        need a waste carrier registration, you can ignore these reminders. You cannot
        transport, buy, sell or dispose of waste without a registration.\r\n\r\n##
        Please note: \r\n\r\nIf you do not renew by 24 May 2026, you\u2019ll need
        to create a new registration which will change your registration number. For
        more information visit: [Register or renew as a waste carrier, broker or dealer
        - GOV.UK](https://www.gov.uk/register-renew-waste-carrier-broker-dealer-england)  \r\n\r\nWaste
        carrier registrations, renewals and associated costs are subject to annual
        increases in line with inflation. \r\n\r\nEnvironment Agency\r\nTelephone
        03708 506 506, Monday to Friday (8am to 6pm)\r\nnccc-carrierbroker@environment-agency.gov.uk\r\n\r\nTo
